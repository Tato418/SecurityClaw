name: threat_analyst
description: >
  Analyzes security findings using RAG context to determine threat level.
  Queries external threat intelligence APIs for IP/domain reputation.

can_answer:
  - "IP reputation"
  - "domain reputation"
  - "threat level assessment"
  - "maliciousness indicators"
  - "risk score"
  - "abuse history"
  - "vulnerability assessment"

cannot_answer:
  - "timeline reconstruction"
  - "log/baseline searching"
  - "alert type searching"
  - "event type searching"
  - "log message searching"
  - "signature matching"
  - "field schema discovery"
  - "historical pattern analysis"

priority_keywords:
  - "reputation"
  - "malicious"
  - "threat"
  - "risk"
  - "vulnerability"
  - "abuse"
  - "blacklist"

min_prior_context: 1
  # Expects at least 1 prior result (entity to evaluate) to work well
  # Can work without, but context makes it more valuable

returns:
  - verdicts
  - confidence_scores
  - source_apis

required_env_vars:
  - name: ABUSEIPDB_API_KEY
    description: "AbuseIPDB API Key (optional—for IP reputation)"
    env_key: ABUSEIPDB_API_KEY
    optional: true
    is_secret: true
  
  - name: ALIENVAULT_API_KEY
    description: "AlienVault OTX API Key (optional—for threat pulses)"
    env_key: ALIENVAULT_API_KEY
    optional: true
    is_secret: true
  
  - name: VIRUSTOTAL_API_KEY
    description: "VirusTotal API Key (optional—for malware detection)"
    env_key: VIRUSTOTAL_API_KEY
    optional: true
    is_secret: true
  
  - name: TALOS_CLIENT_ID
    description: "Cisco Talos Client ID (optional—for enterprise intelligence)"
    env_key: TALOS_CLIENT_ID
    optional: true
    is_secret: true
  
  - name: TALOS_CLIENT_SECRET
    description: "Cisco Talos Client Secret (optional—for enterprise intelligence)"
    env_key: TALOS_CLIENT_SECRET
    optional: true
    is_secret: true
